# JustRebootIt prober configuration.
#
# This file is baked into the image at /etc/justrebootit/targets.yml and can be
# overridden by bind-mounting your own copy (see docker-compose.yml). Tune the
# timing knobs to taste; the defaults send 20 pings spread across each 10s cycle
# to every target, which is enough to catch brief spikes without much traffic.

# Length of one probe cycle. All of a target's pings are spread across this
# window before summary statistics are published.
interval: 10s
# Echo requests sent to each target per cycle. More pings => smoother "smoke".
pings: 20
# Per-reply timeout. Must be smaller than interval.
timeout: 2s
# Raw ICMP sockets (needs NET_RAW, granted in docker-compose.yml).
privileged: true

# Traceroutes are heavier and the path changes slowly, so run them less often.
trace_interval: 60s
trace_max_hops: 30
trace_timeout: 2s

# Prometheus metrics endpoint.
listen_addr: ":9430"

# Targets. Keep names stable over time so historical graphs line up. Use the
# "group" field to organize the dashboard:
#   gateway - your own router/first hop (rule out the LAN)
#   isp     - your ISP's own infrastructure (what you'd show Comcast)
#   anchor  - stable, well-run public anchors (rule out the far end)
#   content - sites you actually care about reaching
targets:
  # --- Your first hop. EDIT this to your gateway's LAN IP. -----------------
  # If latency spikes start here, the problem is inside your house.
  - name: home-gateway
    host: 192.168.1.1
    group: gateway
    trace: false

  # --- Comcast / Xfinity infrastructure (edit for your ISP) ----------------
  # 75.75.75.75 / 75.75.76.76 are Comcast's public DNS resolvers and make a
  # good ISP-side anchor to share with a Comcast network engineer.
  - name: comcast-dns-1
    host: 75.75.75.75
    group: isp
    trace: true
  - name: comcast-dns-2
    host: 75.75.76.76
    group: isp
    trace: false

  # --- Diverse public anchors (different networks/operators) ---------------
  - name: cloudflare-dns
    host: 1.1.1.1
    group: anchor
    trace: true
  # google-dns / level3-dns are kept as always-on latency references but are NOT
  # traced here: path discovery (below) picks a path-diverse subset to trace, so
  # we don't waste traceroutes on routes that overlap cloudflare-dns's path.
  - name: google-dns
    host: 8.8.8.8
    group: anchor
    trace: false
  - name: quad9-dns
    host: 9.9.9.9
    group: anchor
    trace: false
  - name: level3-dns
    host: 4.2.2.2
    group: anchor
    trace: false

  # --- Content destinations you actually use -------------------------------
  - name: google
    host: www.google.com
    group: content
    trace: false
  - name: cloudflare-cdn
    host: www.cloudflare.com
    group: content
    trace: false

# --- Path discovery ----------------------------------------------------------
# Probing many destinations that share the same first few hops is redundant: a
# hiccup on the shared segment spikes everything and localizes nothing.
# Discovery traces this candidate pool periodically and promotes a path-diverse
# subset (distinct 2nd/3rd hops, reachable in the fewest hops) to active probing
# under group "discovered". The always-on targets above are never affected.
discovery:
  enabled: true
  interval: 15m         # re-trace and re-select this often
  max_targets: 6        # how many diverse paths to keep actively probed
  max_hops: 8           # short traces during discovery (we only need early hops)
  max_reach_hops: 12    # drop candidates farther than this; distance dilutes localization
  candidates:
    # A broad pool spanning distinct operators/ASNs so their early hops differ.
    # Names must be unique and must not duplicate the always-on targets above.
    - { name: cloudflare-alt,  host: 1.0.0.1 }
    - { name: google-alt,      host: 8.8.4.4 }
    - { name: quad9-alt,       host: 149.112.112.112 }
    - { name: opendns-a,       host: 208.67.222.222 }
    - { name: opendns-b,       host: 208.67.220.220 }
    - { name: verisign-dns,    host: 64.6.64.6 }
    - { name: hurricane-dns,   host: 74.82.42.42 }
    - { name: adguard-dns,     host: 94.140.14.14 }
    - { name: cleanbrowsing,   host: 185.228.168.9 }
    - { name: neustar-dns,     host: 156.154.70.1 }
    - { name: comodo-dns,      host: 8.26.56.26 }

# --- Latency-triggered diagnostics -------------------------------------------
# When a target's latency or loss looks anomalous, run deeper tests immediately
# to capture signal while the problem is still happening:
#   - a fresh traceroute (path snapshot during the event)
#   - a TCP handshake time (ICMP is often deprioritized; this proves real impact)
#   - a DNS resolution time (a common hidden culprit)
diagnostics:
  enabled: true
  latency_factor: 3.0       # trigger when median > 3x the rolling baseline
  latency_abs_margin: 30ms  # ...and at least 30ms above it (ignores tiny jitter)
  loss_threshold: 0.1       # or when loss >= 10%
  cooldown: 60s             # at most one diagnostic run per target per minute
  baseline_alpha: 0.2       # EWMA smoothing for the "normal latency" baseline
  tcp_port: 443             # handshake port for the TCP latency test
  dns_probe: www.google.com # name resolved & timed during a diagnostic run
  workers: 2                # concurrent diagnostic runs

  # Optional Claude-driven root-cause analysis of each event. It only activates
  # when ANTHROPIC_API_KEY is set in the environment (.env); without a key the
  # prober skips it. The agent queries Prometheus, runs fresh traceroute/DNS,
  # and attributes hops via RDAP, then posts a numbered writeup to Grafana.
  ai:
    enabled: true
    model: claude-opus-4-8  # set claude-sonnet-4-6 for a cheaper, faster analysis
    max_iterations: 12      # cap on the agent's tool-use loop per event
    # Tell the agent about YOUR setup so it reasons about your real environment
    # instead of guessing (line rates, gateway model, what's already configured
    # or tried). Strongly recommended — e.g. it then knows your upload SQM cap is
    # already correct and won't keep telling you to lower it. Free text:
    # context: |
    #   ISP: Comcast/Xfinity, plan 1.2 Gbps down / 35 Mbps up (DOCSIS 3.1).
    #   Gateway: UniFi Dream Machine Pro. Smart Queues is ENABLED with the upload
    #   shaped to ~32 Mbps (~90% of line rate); do not suggest lowering it further.
    #   Download is NOT shaped (a UDM Pro can't shape gigabit). SQM/upload
    #   bufferbloat is already mitigated — prefer other root causes.
    # Cost control: a recurring/shared incident reuses a prior analysis instead
    # of paying for a fresh investigation every cycle.
    repeat_ttl: 1h          # reuse a signature's analysis for this long (no AI call)
    min_interval: 3m        # global minimum time between full investigations
    daily_budget: 50        # hard cap on investigations per 24h (0 = unlimited)
    shared_window: 2m       # window for detecting a shared (cross-target) incident
    shared_threshold: 3     # this many targets tripping together => one investigation
    # Distance: far targets aren't our internet problem, so suppress them harder.
    far_hops: 3             # a target reached in more than this many hops is "far"
    far_repeat_ttl: 12h     # reuse a far problem's analysis this long (vs repeat_ttl)
    skip_far: true          # skip the AI entirely for an isolated far event (one
                            # distant IP acting up while every other path is fine
                            # = the far end's problem, not ours). false = still
                            # investigate far problems with the cheaper model.
    # Model selection: learn cheap-vs-expensive per problem class to cut cost.
    model_eval: true        # eval cheap vs expensive and lock in the good-enough one
    model_cheap: claude-sonnet-4-6  # used for far problems and classes where cheap suffices
    eval_samples: 3         # dual-model evals per class before deciding

  # On-demand "take a look" investigation, triggered by the dashboard button
  # (Grafana proxies the request to the prober server-side; no prober port is
  # exposed). It runs the same agentic investigation as the automatic path but
  # always investigates (no coalescing) and skips the cheap-vs-expensive eval.
  # Because each run makes an LLM call + active probes and the dashboard may be
  # shared, it is rate-limited. Tip: set ANTHROPIC_BASE_URL to a local,
  # Anthropic-compatible model server for zero-cost investigations.
  manual:
    enabled: true
    min_interval: 60s       # min time between manual runs (0 = unlimited)
    daily_cap: 20           # max manual runs per 24h (0 = unlimited)

# --- Latency-under-load (bufferbloat) probe ----------------------------------
# A normal ping measures the link while it's idle — exactly when bufferbloat is
# invisible. Streaming stutter (Plex, video calls) happens only while the link
# is SATURATED: a bulk transfer fills an oversized buffer, every other packet
# queues behind it, and RTT jumps from a few ms to hundreds. This probe recreates
# that on purpose — it saturates the link with a controlled transfer while
# pinging a stable host — and graphs the idle-vs-loaded RTT difference (the
# bufferbloat). A bad grade also posts a dashboard annotation.
#
# It moves REAL data, so it is OFF by default and bounded (byte ceiling +
# duration). Enable it and pick the direction that matches your problem:
#   up   - saturate the uplink. The usual culprit for a Plex SERVER pushing
#          video, or any upload-heavy stutter (cable uplinks buffer the worst).
#   down - saturate the downlink. For a Plex CLIENT / download-heavy stutter.
#   both - measure each direction in turn.
# Fix for a bad grade is almost always SQM/Smart Queues (cake/fq_codel) on the
# offending end — not a faster plan.
underload:
  enabled: false            # opt-in: this generates real traffic
  interval: 15m             # how often to run a loaded-latency test
  target: uplink            # metric label (independent of the targets above)
  host: 1.1.1.1             # pinged under load; a near anchor isolates YOUR link
  direction: up             # up | down | both (see note above)
  duration: 12s             # how long to hold the link under load per direction
  streams: 4                # parallel transfer connections (enough to saturate)
  bytes: 250000000          # ceiling on data moved per direction per run (~250MB)
  pings: 20                 # RTT samples in each of the idle and loaded phases
  timeout: 2s               # per-ping reply timeout
  bad_increase: 60ms        # annotate when loaded RTT rises >= this (0 = never)
  # The defaults use Cloudflare's public speed-test endpoints, built for this.
  # Override to point at your own sink if you prefer.
  down_url: https://speed.cloudflare.com/__down
  up_url: https://speed.cloudflare.com/__up
  # On-demand "run a bufferbloat test on this IP" dashboard button. It reuses the
  # transfer settings above but takes its host from the request, so it works even
  # when the scheduled probe (enabled: false) is off. A click moves real data, so
  # it is rate-limited.
  manual:
    enabled: true             # the dashboard button; a click is explicit consent
    min_interval: 30s         # min time between on-demand runs (0 = unlimited)
    daily_cap: 20             # max on-demand runs per 24h (0 = unlimited)
