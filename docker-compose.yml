# JustRebootIt: home-internet latency recorder.
#
# Brings up four services on one bridge network:
#   prober        - measures latency / loss / traceroutes to diverse targets
#   udm-exporter  - reads WAN throughput & gateway load from a UniFi Dream Machine Pro
#   prometheus    - stores the time series
#   grafana       - one shareable dashboard correlating it all
#
# Quick start:
#   cp .env.example .env   # then edit UDM_* and (optionally) the gateway IP
#   docker compose up -d --build
#   open http://localhost:3000  (admin / the password in .env)

services:
  prober:
    build: .
    image: justrebootit:latest
    container_name: jri-prober
    command: ["-config", "/etc/justrebootit/targets.yml"]
    # Raw ICMP sockets for ping and traceroute.
    cap_add:
      - NET_RAW
    environment:
      # Optional AI root-cause analysis. Leave ANTHROPIC_API_KEY unset in .env to
      # disable it entirely (everything else still works). The prober reads
      # Prometheus and posts Grafana annotations over the internal network.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JRI_PROMETHEUS_URL: http://prometheus:9090
      # Lets the AI read the gateway's current WAN config (Smart Queues, etc.)
      # so it doesn't recommend changes you've already made.
      UDM_EXPORTER_URL: http://udm-exporter:9431
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      # Override the baked-in targets with your own copy. Edit config/targets.yml
      # (at least the home-gateway IP) before bringing the stack up.
      - ./config/targets.yml:/etc/justrebootit/targets.yml:ro
    restart: unless-stopped
    networks: [monitoring]

  udm-exporter:
    build: .
    image: justrebootit:latest
    container_name: jri-udm-exporter
    entrypoint: ["/usr/local/bin/udmexporter"]
    env_file: .env
    environment:
      # Also serves the gateway's (secret-redacted) WAN config at /config and
      # watches it for changes, posting a Grafana annotation when a setting is
      # altered. GRAFANA_ADMIN_PASSWORD comes from .env (above).
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      UDM_CONFIG_INTERVAL: 5m
    restart: unless-stopped
    networks: [monitoring]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: jri-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Keep a long history so you can correlate spikes weeks later.
      - --storage.tsdb.retention.time=90d
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: jri-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      # Zero-click: anonymous viewing is on and the login form is hidden, so
      # opening http://localhost:3000 lands straight on the dashboard with no
      # prompt. It also makes the dashboard shareable with an ISP engineer via a
      # plain link. To edit panels, browse to /login and use admin + the
      # password below. Set GRAFANA_ANON_ENABLED=false if you expose this beyond
      # your LAN.
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANON_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_DISABLE_LOGIN:-true}
      # Land on the latency dashboard instead of the empty Grafana home page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/latency.json
      # Server-side panel/dashboard rendering to PNG, via the renderer service
      # below. Lets you export an image of an incident to hand to your ISP. The
      # renderer loads panels back from Grafana using the callback URL; anonymous
      # viewing (above) means it needs no credentials.
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_LOG_FILTERS: rendering:info
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - renderer
    restart: unless-stopped
    networks: [monitoring]

  # Headless-Chromium image renderer Grafana calls to turn panels/dashboards
  # into PNGs (Share -> Export -> render image, or "Direct link rendered image").
  # No host port is published; it is only reachable on the internal network.
  renderer:
    image: grafana/grafana-image-renderer:v5.8.8
    container_name: jri-renderer
    environment:
      # Listen address Grafana points GF_RENDERING_SERVER_URL at.
      HTTP_PORT: "8081"
      RENDERING_MODE: default
      # The full dashboard is ~3000px tall; raise the viewport cap (default
      # ~3000) so the "Export dashboard as PNG" link can render it without
      # clipping the bottom panel.
      RENDERING_VIEWPORT_MAX_HEIGHT: "4000"
      RENDERING_VIEWPORT_MAX_WIDTH: "2000"
    expose:
      - "8081"
    restart: unless-stopped
    networks: [monitoring]

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
